<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<style>
body{
font-family:Arial;
background:#f5f5f6;
padding:30px;
}

form{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
}

button{
background:#ff3f6c;
color:white;
border:none;
padding:12px;
width:100%;
cursor:pointer;
}
</style>
</head>

<body>

<form>

<h2>Checkout</h2>
<h3 id="productName"></h3>
<h3 id="productPrice"></h3>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email">

<input type="text" placeholder="Phone">

<input type="text" placeholder="Address">

<button type="button"
onclick="placeOrder()">
Place Order
</button>

<input type="text"
id="coupon"
placeholder="Enter Coupon Code">

<button type="button"
onclick="applyCoupon()">
Apply Coupon
</button>

<p id="discountMsg"></p>



</form>

<script>

    let product =
JSON.parse(
localStorage.getItem("checkoutProduct")
);

if(product){

document.getElementById("productName")
.innerText =
"Product : " + product.name;

document.getElementById("productPrice")
.innerText =
"Price : ₹" + product.price;

}

function placeOrder(){

let orders =
JSON.parse(localStorage.getItem("orders"))
|| [];

orders.push({
name: product.name,
price: product.price,
status: "Processing 🟡"
});

localStorage.setItem(
"orders",
JSON.stringify(orders)
);

window.location.href="payment.html";

}
function applyCoupon(){

let code =
document.getElementById("coupon").value;

if(code === "MYNTRA20"){

document.getElementById("discountMsg")
.innerHTML =
"✅ 20% Discount Applied";

}else{

document.getElementById("discountMsg")
.innerHTML =
"❌ Invalid Coupon";

}

}
</script>

</body>
</html>
