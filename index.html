<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myntra Final Pro Clone</title>
<style>
body { margin:0; font-family: Arial; background:#f5f5f6; }.navbar { display:flex; justify-content:space-between; align-items:center; padding:10px 20px; background:white; border-bottom:1px solid #ddd; } .logo { color:#ff3f6c; font-weight:bold; font-size:22px; } .nav-links { display:flex; gap:15px; font-weight:bold; } .search input { padding:8px; width:200px; }
 
.banner { background:#ff3f6c; color:white; text-align:center; padding:60px; font-size:28px; }
 
.products { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; padding:20px; } .card { background:white; padding:10px; border-radius:10px; transition:0.3s; position:relative; } .card:hover { transform:scale(1.05); } .card img { width:100%; border-radius:10px; } .price { color:#ff3f6c; font-weight:bold; }
 
.wishlist { position:absolute; top:10px; right:10px; cursor:pointer; font-size:20px; }
 
button { background:#ff3f6c; color:white; border:none; padding:8px; width:100%; margin-top:5px; cursor:pointer; }
 
.cart { position:fixed; right:-320px; top:0; width:300px; height:100%; background:white; box-shadow:-2px 0 5px rgba(0,0,0,0.2); padding:15px; transition:0.3s; overflow:auto; } .cart.active { right:0; }
 
.login { display:none; position:fixed; top:30%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; border:1px solid #ddd; }
 
.footer { background:#222; color:white; text-align:center; padding:20px; } </style>
 
</head>
<body><div class="navbar">
  <div class="logo">Myntra</div>
  <div class="nav-links">
    <span>Men</span>
    <span>Women</span>
    <span>Kids</span>
    <span>Beauty</span>
  </div>
  <div class="search">
    <input type="text" id="search" placeholder="Search">
  </div>
  <div>
    <span onclick="showLogin()">👤</span>
    <span onclick="toggleCart()">🛒 (<span id="count">0</span>)</span>
  </div>
</div><div class="banner">Big Sale 🔥 50% OFF</div><div class="products" id="productList"></div><div class="cart" id="cart">
  <h3>Cart</h3>
  <div id="cartItems"></div>
  <h4 id="total"></h4>
</div><div class="login" id="loginBox">
  <h3>Login</h3>
  <input placeholder="Username"><br><br>
  <input type="password" placeholder="Password"><br><br>
  <button onclick="closeLogin()">Login</button>
</div><div class="footer">© 2026 Myntra </div>


<script src="./index.js"></script>
</body>
</html>
