<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>

body{
font-family:Arial;
background:#f5f5f6;
padding:30px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
}

h2{
text-align:center;
margin-bottom:20px;
}

.payment-option{
margin:15px 0;
font-size:18px;
}

button{
width:100%;
padding:12px;
background:#ff3f6c;
color:white;
border:none;
cursor:pointer;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>💳 Payment Method</h2>

<div class="payment-option">
<input type="radio" name="payment" value="UPI"> UPI
</div>

<div class="payment-option">
<input type="radio" name="payment" value="Card"> Debit/Credit Card
</div>

<div class="payment-option">
<input type="radio" name="payment" value="COD"> Cash On Delivery
</div>

<button onclick="makePayment()">
Proceed Payment
</button>

</div>

<script>

function makePayment(){

let payment =
document.querySelector(
'input[name="payment"]:checked'
);

if(!payment){

alert("Please select a payment method");
return;

}

alert(
"Payment Successful via " +
payment.value
);

window.location.href =
"success.html";

}

</script>

</body>
</html>
